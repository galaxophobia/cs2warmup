<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS2 Warmup</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>CS2 Warmup</h1>
    <p class="description">
      Prosty trening celowania: klikaj czerwony target i poprawiaj swój wynik.
    </p>
    <button id="startButton" class="start-button">START</button>
    <p id="gameMessage" class="description" aria-live="polite"></p>

    <div id="gameWrapper" class="game-wrapper hidden">
      <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
